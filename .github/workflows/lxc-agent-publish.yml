name: Publish LXC Agent

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.8.0). Defaults to version in package.json.'
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            echo "VERSION=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "push" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch version in lxc-agent/package.json
        run: |
          jq --arg v "${{ steps.version.outputs.VERSION }}" '.version = $v' lxc-agent/package.json > lxc-agent/package.json.tmp
          mv lxc-agent/package.json.tmp lxc-agent/package.json

      - name: Install dependencies
        working-directory: lxc-agent
        run: npm ci

      - name: Build
        working-directory: lxc-agent
        run: npm run build

      - name: Publish
        working-directory: lxc-agent
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
