name: Publish LXC Agent

on:
  push:
    tags: ['lxc-agent-v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com

      - name: Install dependencies
        working-directory: lxc-agent
        run: npm ci

      - name: Build
        working-directory: lxc-agent
        run: npm run build

      - name: Publish
        working-directory: lxc-agent
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
